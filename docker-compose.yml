services:
  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    image: trading-postgres:16
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    volumes:
      - trading_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__TradingDb: Host=db;Port=5432;Database=trading;Username=trading;Password=trading
      ENABLE_TEST_ENDPOINTS: "true"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  trading_postgres_data:
